# Opcional: segredos puxados da AWS com scripts/fetch-secrets.ps1 (ou .sh) → .env.secrets.local
# Se o ficheiro não existir, o Compose ignora (Docker Compose 2.24+).
services:
  api:
    env_file:
      - path: .env.secrets.local
        required: false
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
